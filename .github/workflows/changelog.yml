---
name: Changelog

on:
  push:
    branches: [main]

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: docs/meta/changelog.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(changelog): update changelog [skip ci]"
          title: "chore(changelog): update changelog"
          body: Auto-generated by git-cliff.
          branch: chore/changelog-update
          delete-branch: true
