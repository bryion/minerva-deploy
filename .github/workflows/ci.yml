---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Install Ansible Galaxy dependencies
        run: |
          ansible-galaxy install geerlingguy.docker -p ansible/roles
          ansible-galaxy collection install community.docker

      - name: Write vault password
        run: echo "${{ secrets.VAULT_PASSWORD }}" > .vault_pass

      - name: Run ansible-lint
        run: ansible-lint ansible/playbook.yml

  molecule:
    name: Molecule - ${{ matrix.role }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        role:
          - bootstrap
          - harden
          - compose-sync
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Molecule
        run: |
          cd ansible/roles/${{ matrix.role }}
          molecule test