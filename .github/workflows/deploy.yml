---
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Minerva
    runs-on: ubuntu-24.04
    # Only run when CI completes successfully
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Ansible Galaxy dependencies
        run: ansible-galaxy install -r ansible/requirements.yml

      - name: Write vault password
        run: echo "${{ secrets.VAULT_PASSWORD }}" > .vault_pass

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/minerva_ansible
          chmod 600 ~/.ssh/minerva_ansible

      - name: Join Tailscale
        uses: tailscale/github-action@4e4c49acaa9818630ce0bd7a564372c17e33fb4d # v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-client-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Run Ansible playbook
        env:
          ANSIBLE_CONFIG: ansible/ansible.cfg
        run: |
          ansible-playbook ansible/playbook.yml \
            -i ansible/inventory \
            --private-key ~/.ssh/minerva_ansible \
            -e "ansible_host=${{ secrets.MINERVA_TAILSCALE_IP }}"

      - name: Clean up secrets
        if: always()
        run: |
          rm -f .vault_pass ~/.ssh/minerva_ansible
