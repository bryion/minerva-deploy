---
- name: Configure Minerva
  hosts: minerva
  become: true
  roles:
    # 1. Bootstrap: Creates ansible and minerva users
    - bootstrap

    # 2. Harden: SSH hardening, updates, hushlogin
    - harden

    # 3. Tailscale: Joins server to tailnet for secure remote access
    - tailscale

    # 4. Docker Installation: Installs Docker Engine and Docker Compose plugin
    - geerlingguy.docker

    # 5. Container Deployment: Syncs configs, networks, and .env secrets
    - compose-sync

    # 6. Compose Up: Starts services via docker compose up
    - compose-up
