---
- name: Configure Minerva
  hosts: minerva
  become: true
  roles:
    # 1. Bootstrap: Creates ansible and minerva users
    - bootstrap

    # 2. Harden: SSH hardening, updates, hushlogin
    - harden

    # 3. Docker Installation: Installs Docker Engine and Docker Compose plugin
    - geerlingguy.docker

    # 4. Container Deployment: Copies configs and starts services via Docker Compose
    - compose-sync
