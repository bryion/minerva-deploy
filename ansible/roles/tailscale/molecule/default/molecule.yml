---
dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml
driver:
  name: docker
platforms:
  - name: tailscale-test
    image: geerlingguy/docker-ubuntu2404-ansible:latest@sha256:c4c525faa4e19a0b0bcac5dd636b3f86b987e83f12f6103b266f60d799ee61b4
    pre_build_image: true
    command: /lib/systemd/systemd
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
provisioner:
  name: ansible
  env:
    # artis3n.tailscale v5.0.1 uses a string conditional in its deprecation
    # warning task, which Ansible 2.19 rejects. Allow it until the role or
    # its replacement (the artis3n.tailscale collection) is adopted.
    ANSIBLE_ALLOW_BROKEN_CONDITIONALS: "True"
verifier:
  name: ansible
