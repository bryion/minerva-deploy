---
- name: Converge
  hosts: all
  become: true
  vars:
    tailscale_wrapper_authkey: "{{ lookup('env', 'TAILSCALE_TEST_KEY') | default('tskey-auth-test', true) }}"
    # Skip 'tailscale up' in molecule — no real auth key available in test environments
    tailscale_up_skip: true
  roles:
    - role: bryion.tailscale
