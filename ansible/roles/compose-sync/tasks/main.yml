---
- name: Ensure base directory exists
  ansible.builtin.file:
    path: "{{ compose_sync_base_dir }}"
    state: directory
    owner: "{{ compose_sync_owner }}"
    group: "{{ compose_sync_group }}"
    mode: "0755"

- name: Ensure compose directory exists
  ansible.builtin.file:
    path: "{{ compose_sync_base_dir }}/compose"
    state: directory
    owner: "{{ compose_sync_owner }}"
    group: "{{ compose_sync_group }}"
    mode: "0755"

# src with trailing slash copies the contents of the directory into dest.
# mode: preserve keeps executable permissions on entrypoint scripts.
- name: Sync compose directory to remote
  ansible.builtin.copy:
    src: "{{ compose_sync_src_dir }}/"
    dest: "{{ compose_sync_base_dir }}/compose/"
    owner: "{{ compose_sync_owner }}"
    group: "{{ compose_sync_group }}"
    mode: preserve
    directory_mode: "0755"
  notify: Restart affected services

# Write environment variables as .env files for all services.
# Includes universal vars (PUID, PGID, TZ) + service-specific secrets from vault.
- name: Write .env files for all services
  ansible.builtin.copy:
    dest: "{{ compose_sync_base_dir }}/compose/{{ item }}/.env"
    content: |
      PUID="{{ minerva_puid }}"
      PGID="{{ minerva_pgid }}"
      TZ="{{ minerva_timezone }}"
      {% if item in compose_sync_secrets %}
      {% for k, v in compose_sync_secrets[item].items() %}
      {{ k }}="{{ v }}"
      {% endfor %}
      {% endif %}
    owner: "{{ compose_sync_owner }}"
    group: "{{ compose_sync_group }}"
    mode: "0600"
  loop: "{{ (compose_up_services | default([])) + (compose_up_manual_services | default([])) }}"
  notify: Restart affected services
