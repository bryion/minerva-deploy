---
harden_ssh_port: 22
harden_minerva_user: minerva

# UFW firewall
harden_ufw_enabled: true
harden_ufw_allowed_tcp_ports:
  - "{{ harden_ssh_port }}"  # SSH
  - "53"    # DNS (AdGuard Home)
  - "80"    # HTTP (reverse proxy)
  - "81"    # Nginx Proxy Manager admin
  - "443"   # HTTPS (reverse proxy)
harden_ufw_allowed_udp_ports:
  - "53"    # DNS (AdGuard Home)

# fail2ban
harden_fail2ban_enabled: true
harden_fail2ban_bantime: 1h
harden_fail2ban_findtime: 10m
harden_fail2ban_maxretry: 5
