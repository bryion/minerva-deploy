---
- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Assert PasswordAuthentication is disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        line: "PasswordAuthentication no"
        state: present
      check_mode: true
      register: result
      failed_when: result.changed

    - name: Assert PermitRootLogin is disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        line: "PermitRootLogin no"
        state: present
      check_mode: true
      register: result
      failed_when: result.changed

    - name: Assert UseDNS is disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        line: "UseDNS no"
        state: present
      check_mode: true
      register: result
      failed_when: result.changed

    - name: Assert PermitEmptyPasswords is disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        line: "PermitEmptyPasswords no"
        state: present
      check_mode: true
      register: result
      failed_when: result.changed

    - name: Assert KbdInteractiveAuthentication is disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        line: "KbdInteractiveAuthentication no"
        state: present
      check_mode: true
      register: result
      failed_when: result.changed

    - name: Assert hushlogin file exists
      ansible.builtin.stat:
        path: "/home/minerva/.hushlogin"
      register: hush
      failed_when: not hush.stat.exists

    # --- UFW ---
    - name: Assert UFW package is installed
      ansible.builtin.package:
        name: ufw
        state: present
      check_mode: true
      register: ufw_pkg
      failed_when: ufw_pkg.changed

    - name: Read UFW default policy file
      ansible.builtin.slurp:
        src: /etc/default/ufw
      register: ufw_defaults

    - name: Assert UFW default incoming policy is DROP
      ansible.builtin.assert:
        that:
          - "'DEFAULT_INPUT_POLICY=\"DROP\"' in (ufw_defaults.content | b64decode)"
        fail_msg: "UFW default incoming policy is not DROP"

    # UFW rule file content check is skipped in Docker due to inconsistent initialization
    # of /etc/ufw/user.rules when ufw is not enabled.


    # --- fail2ban ---
    - name: Assert fail2ban package is installed
      ansible.builtin.package:
        name: fail2ban
        state: present
      check_mode: true
      register: f2b_pkg
      failed_when: f2b_pkg.changed

    - name: Assert jail.local exists
      ansible.builtin.stat:
        path: /etc/fail2ban/jail.local
      register: jail_local
      failed_when: not jail_local.stat.exists

    - name: Read jail.local contents
      ansible.builtin.slurp:
        src: /etc/fail2ban/jail.local
      register: jail_content

    - name: Assert jail.local contains sshd jail
      ansible.builtin.assert:
        that:
          - "'[sshd]' in (jail_content.content | b64decode)"
        fail_msg: "jail.local does not contain [sshd] jail"

    - name: Assert jail.local has correct SSH port
      ansible.builtin.assert:
        that:
          - "'port = 22' in (jail_content.content | b64decode)"
        fail_msg: "jail.local does not reference SSH port 22"

    - name: Assert jail.local has bantime
      ansible.builtin.assert:
        that:
          - "'bantime = 1h' in (jail_content.content | b64decode)"
        fail_msg: "jail.local bantime is not 1h"

    - name: Assert jail.local has maxretry
      ansible.builtin.assert:
        that:
          - "'maxretry = 5' in (jail_content.content | b64decode)"
        fail_msg: "jail.local maxretry is not 5"
