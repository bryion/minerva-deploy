---
- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Assert PasswordAuthentication is disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        line: "PasswordAuthentication no"
        state: present
      check_mode: true
      register: result
      failed_when: result.changed

    - name: Assert PermitRootLogin is disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        line: "PermitRootLogin no"
        state: present
      check_mode: true
      register: result
      failed_when: result.changed

    - name: Assert UseDNS is disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        line: "UseDNS no"
        state: present
      check_mode: true
      register: result
      failed_when: result.changed

    - name: Assert PermitEmptyPasswords is disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        line: "PermitEmptyPasswords no"
        state: present
      check_mode: true
      register: result
      failed_when: result.changed

    - name: Assert KbdInteractiveAuthentication is disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        line: "KbdInteractiveAuthentication no"
        state: present
      check_mode: true
      register: result
      failed_when: result.changed

    - name: Assert hushlogin file exists
      ansible.builtin.stat:
        path: "/home/minerva/.hushlogin"
      register: hush
      failed_when: not hush.stat.exists

    # --- UFW ---
    - name: Assert UFW package is installed
      ansible.builtin.package:
        name: ufw
        state: present
      check_mode: true
      register: ufw_pkg
      failed_when: ufw_pkg.changed

    - name: Read UFW default policy file
      ansible.builtin.slurp:
        src: /etc/default/ufw
      register: ufw_defaults

    - name: Assert UFW default incoming policy is DROP
      ansible.builtin.assert:
        that:
          - "'DEFAULT_INPUT_POLICY=\"DROP\"' in (ufw_defaults.content | b64decode)"
        fail_msg: "UFW default incoming policy is not DROP"

    - name: Check UFW user rules exist
      ansible.builtin.stat:
        path: /etc/ufw/user.rules
      register: ufw_user_rules

    - name: Assert UFW user rules file exists
      ansible.builtin.assert:
        that: ufw_user_rules.stat.exists
        fail_msg: "/etc/ufw/user.rules does not exist — UFW rules were not applied"

    - name: Read UFW user rules
      ansible.builtin.slurp:
        src: /etc/ufw/user.rules
      register: ufw_rules_content

    - name: Assert Tailscale UDP port 41641 is in UFW rules
      ansible.builtin.assert:
        that:
          - "'41641' in (ufw_rules_content.content | b64decode)"
        fail_msg: "Tailscale UDP port 41641 not found in UFW rules"

    - name: Assert SSH port is allowed in UFW
      ansible.builtin.assert:
        that:
          - "'22' in (ufw_rules_content.content | b64decode)"
        fail_msg: "SSH port 22 not found in UFW rules"

    - name: Assert HTTP port 80 is allowed in UFW
      ansible.builtin.assert:
        that:
          - "'80' in (ufw_rules_content.content | b64decode)"
        fail_msg: "Port 80 not found in UFW rules"

    - name: Assert HTTPS port 443 is allowed in UFW
      ansible.builtin.assert:
        that:
          - "'443' in (ufw_rules_content.content | b64decode)"
        fail_msg: "Port 443 not found in UFW rules"

    - name: Assert DNS port 53 is allowed in UFW
      ansible.builtin.assert:
        that:
          - "'53' in (ufw_rules_content.content | b64decode)"
        fail_msg: "Port 53 not found in UFW rules"

    # --- fail2ban ---
    - name: Assert fail2ban package is installed
      ansible.builtin.package:
        name: fail2ban
        state: present
      check_mode: true
      register: f2b_pkg
      failed_when: f2b_pkg.changed

    - name: Assert jail.local exists
      ansible.builtin.stat:
        path: /etc/fail2ban/jail.local
      register: jail_local
      failed_when: not jail_local.stat.exists

    - name: Read jail.local contents
      ansible.builtin.slurp:
        src: /etc/fail2ban/jail.local
      register: jail_content

    - name: Assert jail.local contains sshd jail
      ansible.builtin.assert:
        that:
          - "'[sshd]' in (jail_content.content | b64decode)"
        fail_msg: "jail.local does not contain [sshd] jail"

    - name: Assert jail.local has correct SSH port
      ansible.builtin.assert:
        that:
          - "'port = 22' in (jail_content.content | b64decode)"
        fail_msg: "jail.local does not reference SSH port 22"

    - name: Assert jail.local has bantime
      ansible.builtin.assert:
        that:
          - "'bantime = 1h' in (jail_content.content | b64decode)"
        fail_msg: "jail.local bantime is not 1h"

    - name: Assert jail.local has maxretry
      ansible.builtin.assert:
        that:
          - "'maxretry = 5' in (jail_content.content | b64decode)"
        fail_msg: "jail.local maxretry is not 5"
