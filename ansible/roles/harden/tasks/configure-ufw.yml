---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true
    cache_valid_time: 86400

- name: Set UFW default incoming policy to deny
  community.general.ufw:
    default: deny
    direction: incoming
  notify: Reload ufw

- name: Set UFW default outgoing policy to allow
  community.general.ufw:
    default: allow
    direction: outgoing
  notify: Reload ufw

- name: Allow TCP ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ harden_ufw_allowed_tcp_ports }}"
  notify: Reload ufw

- name: Allow UDP ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  loop: "{{ harden_ufw_allowed_udp_ports }}"
  notify: Reload ufw

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: ansible_virtualization_type != 'docker'
  notify: Reload ufw
