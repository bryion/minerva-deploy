---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: bootstrap-test
    image: geerlingguy/docker-ubuntu2404-ansible
    command: /lib/systemd/systemd
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/../
      remote_tmp: /tmp/.ansible/tmp
  inventory:
    directory: ${MOLECULE_SCENARIO_DIRECTORY}
verifier:
  name: ansible
