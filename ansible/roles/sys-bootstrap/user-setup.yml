---
- name: Ensure the defined system user exists
  ansible.builtin.user:
    name: "{{ username }}"
    password: "{{ password | password_hash('sha512') }}"
    shell: "{{ shell }}"
    groups: sudo
    append: true
    state: true
    
- name: Ensure the deploy user exists
  ansible.builtin.user:
    name: "{{ ansible_user_name }}"
    shell: /bin/bash
    groups: sudo
    append: true
    create_home: true
