---
- name: Prepare managed node
  hosts: all
  become: true
  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3-docker
        state: present
        update_cache: true

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Get system architecture
      ansible.builtin.command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ dpkg_arch.stdout }}] https://download.docker.com/linux/ubuntu noble stable"
        state: present

    - name: Install docker-ce-cli and compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce-cli
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure test compose directory exists
      ansible.builtin.file:
        path: /opt/minerva-deploy/compose/testapp
        state: directory
        mode: "0755"

    - name: Create test compose file
      ansible.builtin.copy:
        dest: /opt/minerva-deploy/compose/testapp/compose.yml
        mode: "0644"
        content: |
          services:
            testapp:
              image: alpine:latest
              command: sleep infinity
