# for ssl cert api https://dash.cloudflare.com/profile/api-tokens
services:
  nginxproxymanager:
    image: 'jc21/nginx-proxy-manager:2.12.3' 
    container_name: nginx-proxy-manager
    restart: unless-stopped 
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    environment:
      TZ: "America/Los_Angeles"
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 60s
    networks:
      - networking

networks:
  networking:
    external: true